/* Reset & Global */
* {
 box-sizing: border-box;
 margin: 0;
 padding: 0;
}

/* BACKGROUND MALAM + BINTANG JATUH */
body {
 font-family: Orbitron, sans-serif;
 /* Background diubah dari biru menjadi nuansa emas gelap/hitam metalik */
 background:
radial-gradient(circle at top, rgb(255 0 0 / 85%), transparent 30%), linear-gradient(180deg, #fff200 0%, #ff0000 50%, #000000 100%);
 background-size: cover;
 /* Warna teks utama diubah menjadi emas */
 color: #ca1010;
 display: flex;
 justify-content: center;
 align-items: center;
 min-height: 100vh;
 overflow: hidden;
 padding: 20px;
 flex-direction: column;
 position: relative;
}


/* layer bintang */
body::before,
body::after{
 content:"";
 position:fixed;
 top:-100%;
 left:0;
 width:100%;
 height:200%;
 pointer-events:none;
 z-index:0;
}

/* bintang kecil */
body::before{
 background-image:
 radial-gradient(circle, #caff00 1px, transparent 2px),
 radial-gradient(circle, #fff2a8 1px, transparent 2px),
 radial-gradient(circle, #ffffff 1px, transparent 2px);

 background-size:
 120px 120px,
 180px 180px,
 90px 90px;

 animation: starsFall 18s linear infinite;
 opacity:.8;
}

/* shooting star kecil */
body::after{
 background-image:
 radial-gradient(circle, rgba(255,215,0,.9) 1px, transparent 2px),
 radial-gradient(circle, rgba(255,255,255,.8) 1px, transparent 2px);

 background-size:
 250px 250px,
 350px 350px;

 animation: starsFast 10s linear infinite;
 opacity:.7;
}

@keyframes starsFall{
 from{
  transform:translateY(-20%);
 }
 to{
  transform:translateY(20%);
 }
}

@keyframes starsFast{
 from{
  transform:translateY(-30%);
 }
 to{
  transform:translateY(35%);
 }
}

/* konten di atas background */
.container,
.static-logo,
.footer{
 position:relative;
 z-index:2;
}

.container {
 width: 100%;
 max-width: 1024px;
 display: flex;
 flex-direction: column;
 align-items: center;
 position: relative;
 perspective: 1000px;
 transform-style: preserve-3d;
}

/* 3D Cube */
.cube {
 position: relative;
 width: 300px;
 height: 300px;
 transform-style: preserve-3d;
 transform: rotateX(30deg) rotateY(30deg);
 animation: spin 20s infinite linear;
 margin-top: 20px;
}

.cube div {
 position: absolute;
 width: 100%;
 height: 100%;
 background: #1f1f1f;
 border: 2px solid rgba(255, 255, 255, 0.1);
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 20px;
 opacity: 0.9;
}

.cube .front {
 transform: translateZ(150px);
}

.cube .back {
 transform: rotateY(180deg) translateZ(150px);
}

.cube .left {
 transform: rotateY(-90deg) translateZ(150px);
}

.cube .right {
 transform: rotateY(90deg) translateZ(150px);
}

.cube .top {
 transform: rotateX(90deg) translateZ(150px);
}

.cube .bottom {
 transform: rotateX(-90deg) translateZ(150px);
}

.cube amp-img {
 width: 100%;
 height: 100%;
 object-fit: cover;
}

/* Static Logo */
.static-logo {
 width: 100px;
 height: 100px;
 margin-bottom: -50px;
}

/* Cube Animation */
@keyframes spin {
 from {
  transform: rotateX(30deg) rotateY(30deg);
 }

 to {
  transform: rotateX(30deg) rotateY(390deg);
 }
}

/* Call to Action */
.cta {
 margin-top: 40px;
 font-size: 18px;
 color: #caff00;
 text-align: center;
 animation: text-pulse 2s infinite;
}

@keyframes text-pulse {

 0%,
 100% {
  opacity: 1;
 }

 50% {
  opacity: 0.5;
 }
}

.cta a {
  display: inline-block;
  padding: 12px 24px;
  margin: 10px 5px;
  
  /* Background Hitam Glossy (Efek gradasi untuk kesan mengkilap) */
  background: linear-gradient(180deg, #ff0000 0%, #caff00 50%, #810000 100%);
  
  /* Teks Emas Luxury */
  color: #ffffff;
  font-weight: bold;
  text-decoration: none;
  border-radius: 5px;
  
  /* Tambahan border tipis emas untuk kesan mewah */
  border: 1px solid #caff00;
  
  /* Efek transisi saat di-hover */
  transition: all 0.3s ease;
}

/* Efek saat tombol disentuh/diarahkan kursor */
.cta a:hover {
  background: #1a1a1a;
  box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
  color: #fdf5e6; /* Warna emas lebih muda/terang saat hover */
}

 }
}
